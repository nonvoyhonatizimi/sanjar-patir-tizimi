{% extends "base.html" %}

{% block title %}Kirish - Nonvoyhona Tizimi{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="mb-4">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Sanjar Patir Logo" class="mb-4" style="width: 140px; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <h2 class="fw-bold">Sanjar Patir</h2>
            <p>Nonvoyhona boshqaruv tizimi</p>
        </div>
        <form method="POST">
            <div class="mb-4">
                <label for="username" class="form-label">Login</label>
                <input type="text" class="form-control" id="username" name="username" required placeholder="admin">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Parol</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3" style="font-size: 16px;">
                <i class="fas fa-sign-in-alt me-2"></i> Kirish
            </button>
        </form>
        <div class="mt-4 pt-4" style="border-top: 1px solid var(--apple-gray5);">
            <small style="color: var(--text-secondary);">&copy; 2024 Non Ishlab Chiqarish Sexi</small>
        </div>
    </div>
</div>
{% endblock %}
